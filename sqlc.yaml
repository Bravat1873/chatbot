version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations/*.sql"
    queries:
      - "internal/repository/query/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
