services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: beilang-chatbot-gateway:latest
    container_name: beilang-gateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
