services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-beilang_callbot}
      POSTGRES_USER: ${PG_USER:-beilang}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-replace_me}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-beilang} -d ${PG_DATABASE:-beilang_callbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-go:
    image: chatbot-go
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-go
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PG_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${APP_PORT:-8000}/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
